<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860" role="img" aria-labelledby="title desc">
  <title id="title">Podlord inspector and settings preview</title>
  <desc id="desc">Sanitized preview of Podlord showing a resource inspector, YAML editor, port action, and settings panel.</desc>
  <defs>
