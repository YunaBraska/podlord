      <circle cx="3" cy="4" r="0.7" fill="#273129" opacity="0.45"/>
      <circle cx="12" cy="11" r="0.6" fill="#24303a" opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="1440" height="860" fill="#050707"/>
  <rect x="0" y="0" width="1440" height="54" fill="#101315" stroke="#7f6233"/>
