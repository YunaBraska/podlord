        <text x="0" y="24" fill="#f2e0bf" font-size="19" font-weight="700">Radar water</text>
        <rect x="386" y="0" width="24" height="24" rx="4" fill="#0b1112" stroke="#d69f44"/>
        <path d="M392 12l6 7 13-16" fill="none" stroke="#58d68a" stroke-width="3"/>
        <text x="436" y="21" fill="#b7a98d" font-size="16">Animated radar background</text>
