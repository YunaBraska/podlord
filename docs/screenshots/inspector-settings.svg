  <rect x="0" y="68" width="1440" height="300" fill="#020404" stroke="#846333"/>
  <rect x="0" y="68" width="1440" height="42" fill="url(#panel)" stroke="#846333"/>
  <text x="24" y="96" fill="#d69f44" font-family="SFMono-Regular,Consolas,monospace" font-size="18" font-weight="700">⬢ Pod/payments-api-6cfb85</text>
  <g transform="translate(1210 78)" font-family="SFMono-Regular,Consolas,monospace" font-size="16" font-weight="700">
