        <text x="386" y="46" fill="#b7a98d" font-size="16">0 disables water; speed still scales with API activity.</text>
      </g>
      <g transform="translate(72 282)">
        <text x="0" y="24" fill="#f2e0bf" font-size="19" font-weight="700">Auto-follow radar alerts</text>
        <rect x="386" y="0" width="24" height="24" rx="4" fill="#0b1112" stroke="#d69f44"/>
        <path d="M392 12l6 7 13-16" fill="none" stroke="#58d68a" stroke-width="3"/>
        <text x="436" y="21" fill="#b7a98d" font-size="16">Moves to newest error, warning, or activity.</text>
      </g>
    </g>
  </g>

  <rect x="0" y="822" width="1440" height="38" fill="#101315" stroke="#7f6233"/>
  <text x="16" y="846" fill="#b7a98d" font-family="SFMono-Regular,Consolas,monospace" font-size="18">visible: 128/842   API: 18/min   Synced: 8s ago</text>
