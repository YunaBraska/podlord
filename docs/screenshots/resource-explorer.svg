<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860" role="img" aria-labelledby="title desc">
  <title id="title">Podlord resource explorer preview</title>
  <desc id="desc">Sanitized preview of Podlord showing resource table, pulse strip, radar, and filters.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#14191b"/>
      <stop offset="1" stop-color="#080b0c"/>
    </linearGradient>
    <linearGradient id="cell" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#11191d"/>
      <stop offset="1" stop-color="#070a0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="noise" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#070909"/>
      <circle cx="2" cy="3" r="0.7" fill="#26302b" opacity="0.35"/>
      <circle cx="9" cy="8" r="0.6" fill="#1e2a2f" opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="1440" height="860" fill="url(#noise)"/>
  <rect x="0" y="0" width="1440" height="54" fill="#101315" stroke="#7f6233"/>
