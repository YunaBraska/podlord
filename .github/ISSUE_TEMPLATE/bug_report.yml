name: Bug report
description: Report a reproducible Podlord problem.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the visible behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      placeholder: |
        1. Open ...
        2. Select ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Podlord version
      placeholder: 2026.6.15
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Do not paste real kubeconfigs, tokens, certificates, or secret values.
