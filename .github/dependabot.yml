version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      nuget-all:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      actions-all:
        patterns:
          - "*"
