name: Sync dev from main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-dev-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  sync-dev:
    name: Merge main back into dev
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Merge main into dev
        shell: sh
        run: |
          git config user.name "Podlord Sync Bot"
          git config user.email "sync@podlord.dev"
          git fetch origin main dev --prune
          git checkout dev
          git merge --no-edit origin/main
          git push origin dev
