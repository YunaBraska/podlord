name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag. Empty means today's YYYY.M.D.
        required: false
        type: string
      dry_run:
        description: Test and package without pushing release metadata, tag, or GitHub release.
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      release: ${{ steps.plan.outputs.release }}
      dry_run: ${{ steps.plan.outputs.dry_run }}
      tag: ${{ steps.plan.outputs.tag }}
      version: ${{ steps.plan.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Plan run
        id: plan
        shell: sh
        env:
          HEAD_MESSAGE: ${{ github.event.head_commit.message || '' }}
          INPUT_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          INPUT_TAG: ${{ inputs.tag || '' }}
        run: |
          release="false"
          dry_run="false"
          release_tag=""
          version="0.0.0"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            release="true"
            dry_run="$INPUT_DRY_RUN"
            if [ "$dry_run" != "true" ] && [ "$GITHUB_REF" != "refs/heads/main" ]; then
              echo "Manual releases must run from main. Use dry_run=true for branch validation." >&2
              exit 1
            fi
          elif [ "$GITHUB_EVENT_NAME" = "push" ] \
            && [ "$GITHUB_REF" = "refs/heads/main" ] \
            && ! printf '%s\n' "$HEAD_MESSAGE" | grep -Eq '^chore: release '; then
            release="true"
          fi

          if [ "$release" = "true" ]; then
            if [ -n "$INPUT_TAG" ]; then
              release_tag="$INPUT_TAG"
            else
              year="$(date -u +%Y)"
              month="$(date -u +%m | sed 's/^0//')"
              day="$(date -u +%d | sed 's/^0//')"
              release_tag="$year.$month.$day"
            fi

            if ! printf '%s\n' "$release_tag" | grep -Eq '^[0-9]{4}[.][1-9][0-9]?[.][1-9][0-9]?$'; then
              echo "Release tag must look like 2026.6.15: $release_tag" >&2
              exit 1
            fi

            git fetch --tags --force
            if git rev-parse -q --verify "refs/tags/$release_tag" >/dev/null; then
              echo "Tag already exists: $release_tag" >&2
              exit 1
            fi

            version="$release_tag"
          fi

          echo "event=$GITHUB_EVENT_NAME"
          echo "branch=${GITHUB_REF_NAME:-unknown}"
          echo "release=$release"
          echo "dry_run=$dry_run"
          echo "tag=$release_tag"
          echo "version=$version"

          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  test:
    name: Test before packaging
    needs: plan
    if: needs.plan.outputs.release == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Run tests
        shell: sh
        run: scripts/test.sh

  build:
    name: Build ${{ matrix.asset }}
    needs:
      - plan
      - test
    if: needs.plan.outputs.release == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            asset: linux-x64
            os: ubuntu-24.04
            package: tar.gz
          - rid: linux-arm64
            asset: linux-arm64
            os: ubuntu-24.04
            package: tar.gz
          - rid: linux-arm
            asset: linux-arm
            os: ubuntu-24.04
            package: tar.gz
          - rid: linux-musl-x64
            asset: linux-musl-x64
            os: ubuntu-24.04
            package: tar.gz
          - rid: linux-musl-arm64
            asset: linux-musl-arm64
            os: ubuntu-24.04
            package: tar.gz
          - rid: linux-musl-arm
            asset: linux-musl-arm
            os: ubuntu-24.04
            package: tar.gz
          - rid: win-x64
            asset: win-x64
            os: ubuntu-24.04
            package: zip
          - rid: win-x86
            asset: win-x86
            os: ubuntu-24.04
            package: zip
          - rid: win-arm64
            asset: win-arm64
            os: ubuntu-24.04
            package: zip
          - rid: osx-arm64
            asset: macos-arm64
            os: macos-14
            package: app-zip
          - rid: osx-x64
            asset: macos-x64
            os: macos-15-intel
            package: app-zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Publish portable build
        if: matrix.package != 'app-zip'
        shell: sh
        env:
          RID: ${{ matrix.rid }}
          ASSET: ${{ matrix.asset }}
          PACKAGE: ${{ matrix.package }}
          VERSION: ${{ needs.plan.outputs.version }}
        run: |
          scripts/publish.sh "$RID"
          mkdir -p dist
          python3 - <<'PY'
          import os
          import tarfile
          import zipfile
          from pathlib import Path

          rid = os.environ["RID"]
          asset = os.environ["ASSET"]
          package = os.environ["PACKAGE"]
          source = Path("out") / f"podlord-{rid}"
          if not source.is_dir():
              raise SystemExit(f"missing publish directory: {source}")

          if package == "tar.gz":
              target = Path("dist") / f"podlord-{asset}.tar.gz"
              with tarfile.open(target, "w:gz") as archive:
                  archive.add(source, arcname="podlord")
          elif package == "zip":
              target = Path("dist") / f"podlord-{asset}.zip"
              with zipfile.ZipFile(target, "w", zipfile.ZIP_DEFLATED) as archive:
                  for path in source.rglob("*"):
                      if path.is_file():
                          archive.write(path, Path("podlord") / path.relative_to(source))
          else:
              raise SystemExit(f"unknown package type: {package}")

          print(target)
          PY

      - name: Publish macOS app bundle
        if: matrix.package == 'app-zip'
        shell: sh
        env:
          RID: ${{ matrix.rid }}
          ASSET: ${{ matrix.asset }}
          VERSION: ${{ needs.plan.outputs.version }}
        run: |
          mkdir -p dist
          bundle="$(scripts/build-macos-app.sh "$RID" | tail -n 1)"
          ditto -c -k --sequesterRsrc --keepParent "$bundle" "dist/podlord-$ASSET.zip"

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: podlord-${{ matrix.asset }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Tag and publish release
    needs:
      - plan
      - build
    if: needs.plan.outputs.release == 'true' && needs.plan.outputs.dry_run != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
      RELEASE_TAG: ${{ needs.plan.outputs.tag }}
      RELEASE_VERSION: ${{ needs.plan.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Prepare release metadata
        shell: sh
        run: |
          test -f CHANGELOG.md
          echo "Release $RELEASE_VERSION will tag the protected main commit without mutating CHANGELOG.md."

      - name: Push release tag
        shell: sh
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -n "$RELEASE_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG [skip ci]"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Download assets
        uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: podlord-*
          merge-multiple: true

      - name: Generate checksums
        shell: sh
        run: |
          find dist -maxdepth 1 -type f ! -name SHA256SUMS | sort | while IFS= read -r asset; do
            sha256sum "$asset" | sed 's#  dist/#  #'
          done > dist/SHA256SUMS

      - name: Extract release notes
        shell: sh
        run: |
          awk -v version="$RELEASE_VERSION" '
            $0 ~ "^## \\[" version "\\]" { found = 1; next }
            found && $0 ~ /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            awk '
              /^## \[Unreleased\]/ { found = 1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md > release-notes.md
          fi

          if [ ! -s release-notes.md ]; then
            {
              echo "Podlord $RELEASE_TAG"
              echo ""
              echo "Cross-platform desktop archives are attached below."
            } > release-notes.md
          fi

      - name: Create GitHub release
        shell: sh
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" dist/* \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --notes-file release-notes.md
          fi
